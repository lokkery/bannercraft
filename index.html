<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lokkery/Bannercraft</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    padding: 1.5rem;
  }

  .ui {
    display: flex;
    gap: 1.5rem;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
  }

  .preview-pane {
    flex: 0 0 45%;
    position: sticky;
    top: 1.5rem;
    height: fit-content;
  }

  .settings-pane {
    flex: 1;
    min-width: 0;
  }

  @media (max-width: 800px) {
    .ui { flex-direction: column; }
    .preview-pane { position: static; flex: none; }
  }

  body.image-only { background: transparent; padding: 0; justify-content: flex-start; }
  body.image-only canvas { display: block; max-width: 100%; }
  body.image-only .ui { display: none; }

  h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; color: #111; margin-bottom: 1.5rem; }
  h2 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; color: #111; margin-bottom: 1.5rem; }

  .card { background: #fff; border-radius: 14px; padding: 1.5rem; margin-bottom: 1.25rem; border: 1px solid #e8e6e0; }

  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }

  label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #888; margin-bottom: 6px; }

  textarea, select, input[type=text], input[type=number] {
    width: 100%; padding: 9px 12px; font-size: 14px;
    font-family: inherit; border: 1px solid #e0ddd7; border-radius: 8px;
    background: #fafaf8; color: #111; outline: none; transition: border-color 0.15s;
  }
  textarea { resize: vertical; }
  textarea:focus, select:focus, input[type=text]:focus, input[type=number]:focus { border-color: #aaa; background: #fff; }

  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row .field { flex: 1; min-width: 150px; }

  .swatches { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 2px; }
  .swatch {
    width: 30px; height: 30px; border-radius: 7px;
    cursor: pointer; border: 3px solid transparent;
    transition: transform 0.1s, border-color 0.1s;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.active { border-color: #111; }

  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 6px 13px; font-size: 12px; font-weight: 600;
    border-radius: 99px; border: 1.5px solid #e0ddd7;
    background: transparent; cursor: pointer; color: #555; transition: all 0.1s;
  }
  .pill:hover { border-color: #aaa; color: #111; }
  .pill.active { background: #111; color: #fff; border-color: #111; }

  .preview-wrap { border-radius: 10px; overflow: hidden; border: 1px solid #e8e6e0; background: #ddd; }
  canvas { display: block; width: 100%; height: auto; }

  .slider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; }
  @media (max-width: 540px) { .slider-grid { grid-template-columns: 1fr; } }

  .slider-field label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .slider-field label .val { font-weight: 700; color: #444; font-size: 12px; letter-spacing: 0; text-transform: none; }
  input[type=range] { width: 100%; accent-color: #111; cursor: pointer; display: block; }

  .res-row { display: flex; gap: 8px; align-items: center; }
  .res-row input[type=number] { width: 90px; text-align: center; }
  .res-sep { color: #999; font-size: 16px; }
  .res-presets { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .res-preset { padding: 4px 10px; font-size: 11px; font-weight: 600; border-radius: 99px; border: 1.5px solid #e0ddd7; background: transparent; cursor: pointer; color: #666; transition: all 0.1s; }
  .res-preset:hover { border-color: #aaa; color: #111; }

  .url-box { display: flex; gap: 8px; align-items: center; }
  .url-box input { flex: 1; font-size: 11px; font-family: 'Courier New', monospace; color: #555; background: #fafaf8; padding: 9px 12px; border-radius: 8px; border: 1px solid #e0ddd7; outline: none; }

  .btn { padding: 9px 18px; font-size: 13px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #111; color: #fff; }
  .btn-ghost { background: #f0ede8; color: #333; }
  .btn:hover { opacity: 0.85; }

  .actions { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }
  small { font-size: 11px; color: #aaa; margin-top: 4px; display: block; }
  .card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #bbb; margin-bottom: 14px; }

  .footer {
    margin-top: 2rem;
    text-align: center;
    padding: 1rem;
    font-size: 12px;
    color: #888;
  }
  .footer a {
    color: #888;
    text-decoration: none;
    border-bottom: 1px solid #ccc;
    transition: border-color 0.2s;
  }
  .footer a:hover {
    border-color: #111;
  }
</style>
</head>
<body>

<div class="ui">
  <div class="preview-pane">
    <div class="card">
      <h1>Bannercraft<br><span class="card-title">by Lokkery</span></h1>
      <div class="preview-wrap">
        <canvas id="canvas"></canvas>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="downloadPNG()">↓ Download PNG</button>
        <button class="btn btn-ghost" onclick="copyURL()">Copy URL</button>
      </div>
      <div class="field" style="margin-top:1rem;">
        <label>Shareable URL</label>
        <div class="url-box">
          <input type="text" id="urlOut" readonly />
        </div>
        <small>Add &amp;raw=1 to get the image directly with no UI</small>
      </div>
    </div>
  </div>

  <div class="settings-pane">
    <!-- Content card -->
  <div class="card">
    <div class="card-title">Content</div>
    <div class="field">
      <label>Headline text</label>
      <textarea id="text" rows="3">One HTML file. Zero dependencies. Infinite banners.</textarea>
    </div>
    <div class="row">
      <div class="field">
        <label>Font</label>
        <select id="fontSelect">
          <option value="Arial" data-stack="Arial, sans-serif">Arial (system)</option>
          <option value="Georgia" data-stack="Georgia, serif">Georgia (system)</option>
          <optgroup label="── Google Fonts ──────────">
            <option value="Inter"            data-gfont="Inter:wght@900"            data-stack="'Inter', sans-serif">Inter</option>
            <option value="Montserrat"       data-gfont="Montserrat:wght@900"       data-stack="'Montserrat', sans-serif">Montserrat</option>
            <option value="Oswald"           data-gfont="Oswald:wght@700"           data-stack="'Oswald', sans-serif">Oswald</option>
            <option value="Raleway"          data-gfont="Raleway:wght@900"          data-stack="'Raleway', sans-serif">Raleway</option>
            <option value="Playfair Display" data-gfont="Playfair+Display:wght@900" data-stack="'Playfair Display', serif">Playfair Display</option>
            <option value="Lato"             data-gfont="Lato:wght@900"             data-stack="'Lato', sans-serif">Lato</option>
            <option value="Nunito"           data-gfont="Nunito:wght@900"           data-stack="'Nunito', sans-serif">Nunito</option>
            <option value="Poppins"          data-gfont="Poppins:wght@800"          data-stack="'Poppins', sans-serif">Poppins</option>
            <option value="Roboto Slab"      data-gfont="Roboto+Slab:wght@900"      data-stack="'Roboto Slab', serif">Roboto Slab</option>
            <option value="DM Sans"          data-gfont="DM+Sans:wght@900"          data-stack="'DM Sans', sans-serif">DM Sans</option>
            <option value="Space Grotesk"    data-gfont="Space+Grotesk:wght@700"    data-stack="'Space Grotesk', sans-serif">Space Grotesk</option>
            <option value="Bebas Neue"       data-gfont="Bebas+Neue"                data-stack="'Bebas Neue', sans-serif">Bebas Neue</option>
            <option value="Righteous"        data-gfont="Righteous"                 data-stack="'Righteous', cursive">Righteous</option>
            <option value="Merriweather"     data-gfont="Merriweather:wght@900"     data-stack="'Merriweather', serif">Merriweather</option>
          </optgroup>
        </select>
      </div>
      <div class="field">
        <label>Text color</label>
        <div class="pills" id="textColorPills">
          <button class="pill active" data-val="dark">Dark</button>
          <button class="pill" data-val="white">White</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Brand / tagline (bottom right)</label>
      <input type="text" id="tagline" placeholder="e.g. Bannercraft or lokkery.com" value="Bannercraft" />
    </div>
    <div class="slider-grid" style="margin-top:0.5rem;">
      <div class="slider-field">
        <label>Headline size <span class="val" id="headlineSzVal">Auto</span></label>
        <input type="range" id="headlineSize" min="0" max="100" value="0" />
        <small>0 = auto-fit to canvas</small>
      </div>
      <div class="slider-field">
        <label>Brand size <span class="val" id="brandSzVal">5</span></label>
        <input type="range" id="brandSize" min="1" max="10" value="5" />
      </div>
      <div class="slider-field">
        <label>Brand opacity <span class="val" id="brandOpacityVal">75%</span></label>
        <input type="range" id="brandOpacity" min="10" max="100" value="75" />
      </div>
    </div>
  </div>

  <!-- Design card -->
  <div class="card">
    <div class="card-title">Design</div>
    <div class="field">
      <label>Background theme</label>
      <div class="swatches" id="swatches"></div>
    </div>
    <div class="field" style="margin-top:1.25rem;">
      <label>Resolution (px)</label>
      <div class="res-row">
        <input type="number" id="resW" value="1200" min="100" max="8000" />
        <span class="res-sep">×</span>
        <input type="number" id="resH" value="400" min="100" max="8000" />
      </div>
      <div class="res-presets">
        <button class="res-preset" data-w="1200" data-h="400">Wide 3:1</button>
        <button class="res-preset" data-w="1200" data-h="630">OG 1.91:1</button>
        <button class="res-preset" data-w="1200" data-h="628">LinkedIn</button>
        <button class="res-preset" data-w="1500" data-h="500">Twitter / X</button>
        <button class="res-preset" data-w="820"  data-h="312">Facebook Cover</button>
        <button class="res-preset" data-w="1280" data-h="640">GitHub</button>
        <button class="res-preset" data-w="800"  data-h="418">Dev.to</button>
        <button class="res-preset" data-w="1920" data-h="1080">Full HD</button>
        <button class="res-preset" data-w="2560" data-h="1440">2K</button>
      </div>
    </div>
  </div>

  <!-- Spacing card -->
  <div class="card">
    <div class="card-title">Spacing</div>
    <div class="slider-grid">
      <div class="slider-field">
        <label>Horizontal padding <span class="val" id="padXVal">9%</span></label>
        <input type="range" id="padX" min="1" max="25" value="9" />
      </div>
      <div class="slider-field">
        <label>Vertical padding <span class="val" id="padYVal">16%</span></label>
        <input type="range" id="padY" min="1" max="35" value="16" />
      </div>
    </div>
  </div>
  </div>
</div>

<footer class="footer">
  BannerCraft by <a href="https://lokkery.com" target="_blank">lokkery.com</a>
</footer>

<canvas id="canvasStandalone" style="display:none"></canvas>

<script>
// ── Themes ──────────────────────────────────────────────────────────────────
const THEMES = [
  // Warm
  { id:'sunrise',     label:'Sunrise',     stops:['#f7e448','#f5a623','#f06b10'], dark:'#0f2151', light:'#fff' },
  { id:'ember',       label:'Ember',       stops:['#ffd166','#ef7c35','#c0392b'], dark:'#2a0a00', light:'#fff' },
  { id:'peach',       label:'Peach',       stops:['#ffe0b2','#ffb07a','#e8384f'], dark:'#3a000c', light:'#fff' },
  { id:'rose-gold',   label:'Rose Gold',   stops:['#f7c5c5','#e8698a','#c0392b'], dark:'#2d0010', light:'#fff' },
  { id:'cherry',      label:'Cherry',      stops:['#ff9a9e','#e84393','#7b0057'], dark:'#1a0020', light:'#fff' },
  { id:'autumn',      label:'Autumn',      stops:['#d4380d','#fa8c16','#fadb14'], dark:'#2a0a00', light:'#fff' },
  { id:'heatmap',     label:'Heat',        stops:['#f12711','#f5af19','#fff200'], dark:'#1a0000', light:'#fff' },
  { id:'golden-hour', label:'Golden Hour', stops:['#f6d365','#fda085','#f093fb'], dark:'#2a0a00', light:'#fff' },
  { id:'candy',       label:'Candy',       stops:['#f7971e','#ffd200','#f953c6'], dark:'#1a0020', light:'#fff' },
  // Cool
  { id:'sky',         label:'Sky',         stops:['#a8edea','#4a9ef5','#0055cc'], dark:'#002166', light:'#fff' },
  { id:'ocean',       label:'Ocean',       stops:['#1CB5E0','#0d6efd','#0a3d8f'], dark:'#001133', light:'#fff' },
  { id:'cosmic',      label:'Cosmic',      stops:['#4facfe','#00f2fe','#a8edea'], dark:'#001a30', light:'#fff' },
  { id:'nordic',      label:'Nordic',      stops:['#e0f7fa','#80deea','#006064'], dark:'#002030', light:'#fff' },
  { id:'steel',       label:'Steel',       stops:['#c9d6e3','#6b8cae','#2c3e50'], dark:'#0a1520', light:'#fff' },
  { id:'northern',    label:'Northern',    stops:['#005c97','#363795','#1a1aff'], dark:'#c0e8ff', light:'#fff' },
  { id:'dusk',        label:'Dusk',        stops:['#2c3e50','#fd746c','#ff9068'], dark:'#0a0a10', light:'#fff' },
  // Green
  { id:'mint',        label:'Mint',        stops:['#d4fc79','#7bf0a8','#0d9e54'], dark:'#023b1e', light:'#fff' },
  { id:'forest',      label:'Forest',      stops:['#56ab2f','#2c7744','#0a3d2f'], dark:'#011a0f', light:'#fff' },
  { id:'teal-lime',   label:'Teal Lime',   stops:['#11998e','#38ef7d','#c9f168'], dark:'#012a20', light:'#fff' },
  { id:'emerald',     label:'Emerald',     stops:['#43e97b','#38f9d7','#0cebeb'], dark:'#003322', light:'#fff' },
  { id:'matrix',      label:'Matrix',      stops:['#000000','#003300','#00ff00'], dark:'#00ff00', light:'#00ff00' },
  // Purple / Pink
  { id:'lavender',    label:'Lavender',    stops:['#e8d5ff','#c8a6ff','#7c3aed'], dark:'#1a0050', light:'#fff' },
  { id:'neon-dusk',   label:'Neon Dusk',   stops:['#f953c6','#b91d73','#6a0dad'], dark:'#1a0030', light:'#fff' },
  { id:'aurora',      label:'Aurora',      stops:['#a18cd1','#fbc2eb','#f093fb'], dark:'#1a0030', light:'#fff' },
  { id:'plum',        label:'Plum',        stops:['#7f00ff','#4a00e0','#200060'], dark:'#f0e8ff', light:'#fff' },
  { id:'blueberry',   label:'Blueberry',   stops:['#4776e6','#8e54e9','#c471ed'], dark:'#0a0030', light:'#fff' },
  { id:'retrowave',   label:'Retrowave',   stops:['#0f0c29','#302b63','#24243e'], dark:'#ff6ec7', light:'#ff6ec7' },
  { id:'watermelon',  label:'Watermelon',  stops:['#ff4e50','#f9d423','#a8e063'], dark:'#1a0000', light:'#fff' },
  // Neutral / Dark
  { id:'sand',        label:'Sand',        stops:['#f5e6c8','#e8c98a','#c8a05a'], dark:'#2a1a00', light:'#fff' },
  { id:'slate',       label:'Slate',       stops:['#8e9eab','#4a5568','#1a202c'], dark:'#f5f5f0', light:'#fff' },
  { id:'midnight',    label:'Midnight',    stops:['#434343','#1a1a2e','#000000'], dark:'#f5f5f0', light:'#fff' },
  { id:'obsidian',    label:'Obsidian',    stops:['#2c3e50','#1a1a2e','#0d0d0d'], dark:'#e8e8e8', light:'#fff' },
];

const state = {
  theme: 'sunrise',
  textColor: 'dark',
  fontStack: 'Arial, sans-serif',
  fontName: 'Arial',
  brandOpacity: 75,
};

// ── Build swatches ──────────────────────────────────────────────────────────
const swatchContainer = document.getElementById('swatches');
THEMES.forEach(th => {
  const el = document.createElement('div');
  el.className = 'swatch' + (th.id === state.theme ? ' active' : '');
  el.dataset.theme = th.id;
  el.title = th.label;
  el.style.background = `linear-gradient(135deg, ${th.stops[0]}, ${th.stops[1]}, ${th.stops[2]})`;
  el.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    state.theme = th.id;
    redraw();
  });
  swatchContainer.appendChild(el);
});

// ── Google Fonts loader ─────────────────────────────────────────────────────
const loadedFonts = new Set();
function loadGoogleFont(gfont) {
  if (!gfont || loadedFonts.has(gfont)) return Promise.resolve();
  loadedFonts.add(gfont);
  return new Promise(resolve => {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${gfont}&display=swap`;
    link.onload = resolve; link.onerror = resolve;
    document.head.appendChild(link);
  });
}

// ── Draw ────────────────────────────────────────────────────────────────────
function getTheme(id) {
  return THEMES.find(t => t.id === id) || THEMES[0];
}

function draw(canvas, opts) {
  const th = getTheme(opts.theme);
  const w = Math.max(100, Math.min(8000, opts.w || 1200));
  const h = Math.max(100, Math.min(8000, opts.h || 400));
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Gradient background
  const gr = ctx.createLinearGradient(0, 0, w, h);
  gr.addColorStop(0,   th.stops[0]);
  gr.addColorStop(0.5, th.stops[1]);
  gr.addColorStop(1,   th.stops[2]);
  ctx.fillStyle = gr;
  ctx.fillRect(0, 0, w, h);

  const useDark = opts.textColor !== 'white';
  const color = useDark ? th.dark : th.light;
  const fontStack = opts.fontStack || 'Arial, sans-serif';

  // Padding from sliders
  const padX = Math.round(w * (opts.padX || 9) / 100);
  const padY = Math.round(h * (opts.padY || 16) / 100);
  const maxW = w - padX * 2;

  // ── Tagline bottom-right ──
  const tagline = (opts.tagline || '').trim();
  if (tagline) {
    const brandScale = (opts.brandSize || 5) / 5;
    const tagSz = Math.round(h * 0.055 * brandScale);
    ctx.font = `700 ${tagSz}px ${fontStack}`;
    ctx.fillStyle = color;
    ctx.globalAlpha = (opts.brandOpacity || 75) / 100;
    const tagW = ctx.measureText(tagline).width;
    ctx.fillText(tagline, w - padX - tagW, h - padY);
    ctx.globalAlpha = 1;
  }

  // ── Headline ──
  const text = (opts.text || '').trim();
  if (!text) return;

  const maxFs = Math.round(h * 0.115);
  const minFs = Math.round(h * 0.042);

  function wrap(words, fs) {
    ctx.font = `900 ${fs}px ${fontStack}`;
    const lines = []; let line = '';
    for (const word of words) {
      const t = line ? line + ' ' + word : word;
      if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = word; }
      else line = t;
    }
    if (line) lines.push(line);
    return lines;
  }

  const words = text.split(' ');
  let fs, lines;

  if (opts.headlineSize > 0) {
    fs = Math.round(minFs + (opts.headlineSize / 100) * (maxFs - minFs));
    lines = wrap(words, fs);
  } else {
    fs = maxFs; lines = [];
    while (fs >= minFs) {
      lines = wrap(words, fs);
      if (lines.length * fs * 1.2 <= h - padY * 2.2) break;
      fs -= 2;
    }
  }

  ctx.font = `900 ${fs}px ${fontStack}`;
  ctx.fillStyle = color;
  const lh = fs * 1.2;
  lines.forEach((line, i) => ctx.fillText(line, padX, padY + fs + i * lh));
}

// ── Collect UI options ──────────────────────────────────────────────────────
function getOpts() {
  return {
    text:         document.getElementById('text').value,
    tagline:      document.getElementById('tagline').value,
    headlineSize: +document.getElementById('headlineSize').value,
    brandSize:    +document.getElementById('brandSize').value,
    brandOpacity: +document.getElementById('brandOpacity').value,
    padX:         +document.getElementById('padX').value,
    padY:         +document.getElementById('padY').value,
    w:            +document.getElementById('resW').value || 1200,
    h:            +document.getElementById('resH').value || 400,
    theme:        state.theme,
    textColor:    state.textColor,
    fontStack:    state.fontStack,
    fontName:     state.fontName,
  };
}

function redraw() {
  draw(document.getElementById('canvas'), getOpts());
  updateURL();
}

// ── URL ─────────────────────────────────────────────────────────────────────
function buildURL(opts) {
  const base = location.href.split('?')[0];
  const p = new URLSearchParams({ text: opts.text });
  if (opts.theme     !== 'sunrise') p.set('theme', opts.theme);
  if (opts.w         !== 1200)      p.set('w', opts.w);
  if (opts.h         !== 400)       p.set('h', opts.h);
  if (opts.textColor !== 'dark')    p.set('textColor', opts.textColor);
  if (opts.fontName  !== 'Arial')   p.set('font', opts.fontName);
  if (opts.tagline)                 p.set('tagline', opts.tagline);
  if (opts.headlineSize > 0)        p.set('hs', opts.headlineSize);
  if (opts.brandSize !== 5)         p.set('bs', opts.brandSize);
  if (opts.brandOpacity !== 75)     p.set('bo', opts.brandOpacity);
  if (opts.padX !== 9)              p.set('px', opts.padX);
  if (opts.padY !== 16)             p.set('py', opts.padY);
  p.set('raw', '1');
  return `${base}?${p.toString()}`;
}

function updateURL() {
  const el = document.getElementById('urlOut');
  if (el) el.value = buildURL(getOpts());
}

function copyURL() {
  navigator.clipboard.writeText(document.getElementById('urlOut').value).then(() => {
    const btn = event.target;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy URL', 1500);
  });
}

function downloadPNG() {
  const c = document.getElementById('canvas');
  const a = document.createElement('a');
  const w = document.getElementById('resW').value;
  const h = document.getElementById('resH').value;
  a.download = `banner-${w}x${h}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}

// ── Controls ────────────────────────────────────────────────────────────────
document.getElementById('text').addEventListener('input', redraw);
document.getElementById('tagline').addEventListener('input', redraw);
document.getElementById('resW').addEventListener('input', redraw);
document.getElementById('resH').addEventListener('input', redraw);

document.getElementById('headlineSize').addEventListener('input', e => {
  const v = +e.target.value;
  document.getElementById('headlineSzVal').textContent = v === 0 ? 'Auto' : v;
  redraw();
});
document.getElementById('brandSize').addEventListener('input', e => {
  document.getElementById('brandSzVal').textContent = e.target.value;
  redraw();
});
document.getElementById('brandOpacity').addEventListener('input', e => {
  document.getElementById('brandOpacityVal').textContent = e.target.value + '%';
  redraw();
});
document.getElementById('padX').addEventListener('input', e => {
  document.getElementById('padXVal').textContent = e.target.value + '%';
  redraw();
});
document.getElementById('padY').addEventListener('input', e => {
  document.getElementById('padYVal').textContent = e.target.value + '%';
  redraw();
});

document.getElementById('fontSelect').addEventListener('change', async e => {
  const opt = e.target.selectedOptions[0];
  state.fontStack = opt.dataset.stack || 'Arial, sans-serif';
  state.fontName  = opt.value;
  if (opt.dataset.gfont) {
    await loadGoogleFont(opt.dataset.gfont);
    await document.fonts.load(`900 48px '${opt.value}'`);
  }
  redraw();
});

document.getElementById('textColorPills').querySelectorAll('.pill').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('#textColorPills .pill').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    state.textColor = el.dataset.val;
    redraw();
  });
});

document.querySelectorAll('.res-preset').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('resW').value = btn.dataset.w;
    document.getElementById('resH').value = btn.dataset.h;
    redraw();
  });
});

// ── URL param / raw mode ────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);

async function applyParams(opts, canvas) {
  const fontOpt = [...document.getElementById('fontSelect').options]
    .find(o => o.value === opts.fontName);
  if (fontOpt && fontOpt.dataset.gfont) {
    await loadGoogleFont(fontOpt.dataset.gfont);
    await document.fonts.load(`900 48px '${fontOpt.value}'`);
    opts.fontStack = fontOpt.dataset.stack;
  }
  draw(canvas, opts);
}

if (params.has('text')) {
  const fontName = params.get('font') || 'Arial';
  const opts = {
    text:         params.get('text') || '',
    tagline:      params.get('tagline') || '',
    headlineSize: +(params.get('hs')  || 0),
    brandSize:    +(params.get('bs')  || 5),
    brandOpacity: +(params.get('bo')  || 75),
    padX:         +(params.get('px')  || 9),
    padY:         +(params.get('py')  || 16),
    w:            +(params.get('w')   || 1200),
    h:            +(params.get('h')   || 400),
    theme:        params.get('theme') || 'sunrise',
    textColor:    params.get('textColor') || 'dark',
    fontName,
    fontStack: 'Arial, sans-serif',
  };

  if (params.get('raw') === '1') {
    document.body.classList.add('image-only');
    const c = document.getElementById('canvasStandalone');
    c.style.display = 'block';
    draw(c, opts);
    applyParams(opts, c).then(() => {
      if (params.get('download') === '1') {
        const a = document.createElement('a');
        a.download = `banner-${opts.w}x${opts.h}.png`;
        a.href = c.toDataURL('image/png');
        a.click();
      }
    });
  } else {
    document.getElementById('text').value = opts.text;
    if (opts.tagline)  document.getElementById('tagline').value = opts.tagline;
    document.getElementById('resW').value = opts.w;
    document.getElementById('resH').value = opts.h;
    if (opts.headlineSize) { document.getElementById('headlineSize').value = opts.headlineSize; document.getElementById('headlineSzVal').textContent = opts.headlineSize; }
    if (opts.brandSize !== 5) { document.getElementById('brandSize').value = opts.brandSize; document.getElementById('brandSzVal').textContent = opts.brandSize; }
    if (opts.brandOpacity !== 75) { document.getElementById('brandOpacity').value = opts.brandOpacity; document.getElementById('brandOpacityVal').textContent = opts.brandOpacity + '%'; }
    if (opts.padX !== 9)  { document.getElementById('padX').value = opts.padX; document.getElementById('padXVal').textContent = opts.padX + '%'; }
    if (opts.padY !== 16) { document.getElementById('padY').value = opts.padY; document.getElementById('padYVal').textContent = opts.padY + '%'; }

    const themeEl = swatchContainer.querySelector(`[data-theme="${opts.theme}"]`);
    if (themeEl) { document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active')); themeEl.classList.add('active'); state.theme = opts.theme; }
    if (opts.textColor === 'white') {
      state.textColor = 'white';
      document.querySelectorAll('#textColorPills .pill').forEach(x => x.classList.toggle('active', x.dataset.val === 'white'));
    }
    const fontSel = document.getElementById('fontSelect');
    const matchOpt = [...fontSel.options].find(o => o.value === fontName);
    if (matchOpt) { fontSel.value = fontName; state.fontStack = matchOpt.dataset.stack || 'Arial, sans-serif'; state.fontName = fontName; }
  }
}

redraw();
</script>
</body>
</html>
